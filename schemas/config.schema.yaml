# GoRepos Configuration Schema
# This schema defines the structure and validation rules for gorepos configuration files
# Uses modular schema references for maintainability

$schema: "http://json-schema.org/draft-07/schema#"
title: "GoRepos Configuration"
description: "Configuration schema for GoRepos repository management tool"
type: object

properties:
  version:
    type: string
    enum: ["1.0"]
    description: "Configuration file format version"
    default: "1.0"

  includes:
    type: array
    description: "List of configuration files to include and merge. Each entry is either a plain string (local path or raw URL) or a structured object for git repository sources."
    items:
      oneOf:
        - type: string
          description: "Local file path (relative or absolute) or raw HTTP/HTTPS URL"
        - type: object
          description: "Structured include source: either a local path object or a remote git repository source"
          oneOf:
            - required: ["path"]
              properties:
                path:
                  type: string
                  description: "Local path to include file"
              additionalProperties: false
            - required: ["repo"]
              properties:
                repo:
                  type: string
                  description: "Remote git repository URL (https:// or git@host:org/repo)"
                  examples:
                    - "https://github.com/org/repo"
                    - "https://dev.azure.com/org/project/_git/repo"
                    - "git@github.com:org/repo"
                ref:
                  type: string
                  description: "Branch name, tag (as refs/tags/<TAG>), or commit hash (omit for default branch)"
                  examples: ["main", "develop", "refs/tags/v1.0.0", "abc123f"]
                file:
                  type: string
                  description: "Path to the config file within the repository"
                  default: "gorepos.yaml"
                user:
                  type: string
                  description: "Git user.name applied to repos from this config source. Overrides global.credentials.gitUserName for repos loaded from this include. Per-repo user field still takes highest precedence."
                  examples: ["Jane Dev", "John Smith"]
                email:
                  type: string
                  description: "Git user.email applied to repos from this config source. Overrides global.credentials.gitUserEmail for repos loaded from this include. Per-repo email field still takes highest precedence."
                  examples: ["jane@example.com", "john@company.com"]
              additionalProperties: false
    examples:
      - - "./configs/github.yaml"
        - "https://raw.githubusercontent.com/LederWorks/gorepos-config/main/gorepos.yaml"
        - repo: "https://github.com/LederWorks/gorepos-lederworks-gh"
          ref: "main"
        - repo: "https://dev.azure.com/org/project/_git/gorepos-config"

  global:
    $ref: "global.schema.yaml"
    description: "Global settings that apply to all repositories"

  repositories:
    type: array
    description: "List of repository definitions"
    items:
      $ref: "repository.schema.yaml"

  groups:
    $ref: "groups.schema.yaml"
    description: "Named groups of repositories for batch operations"

  templates:
    $ref: "templates.schema.yaml" 
    description: "Template definitions for generating repository content (planned feature)"

required: []
additionalProperties: false

examples:
  - # Minimal configuration
    version: "1.0"
    global:
      basePath: "~/git"
    repositories:
      - name: "my-project"
        path: "personal/my-project"
        url: "https://github.com/username/my-project.git"
  
  - # Full configuration example
    version: "1.0"
    includes:
      - "https://raw.githubusercontent.com/LederWorks/gorepos-config/main/gorepos.yaml"
    
    global:
      basePath: "C:\\Data\\GIT"
      workers: 8
      timeout: "300s"
      environment:
        GIT_CONFIG_GLOBAL: ""
      credentials:
        sshKeyPath: "~/.ssh/id_rsa"
      tags:
        company: "lederworks"
        environment: "development"
      labels:
        - "managed"
        - "development"
    
    repositories:
      - name: "gorepos"
        path: "lederworks/gorepos"
        url: "https://github.com/LederWorks/gorepos.git"
        branch: "main"
        tags:
          language: "go"
          type: "tool"
        labels:
          - "cli"
          - "automation"
      
      - name: "docs-site"
        path: "company/documentation"
        url: "https://github.com/company/docs.git"
        branch: "main"
        disabled: false
        commands:
          build: "hugo"
          serve: "hugo serve"
        environment:
          HUGO_ENV: "production"
    
    groups:
      tools: ["gorepos"]
      documentation: ["docs-site"]
      all: ["gorepos", "docs-site"]

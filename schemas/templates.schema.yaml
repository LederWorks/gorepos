# Templates Schema
# Defines the structure for repository content templates in GoRepos configuration

$schema: "http://json-schema.org/draft-07/schema#"
title: "Repository Templates Configuration"
description: "Schema for template definitions"
type: object
additionalProperties: true

# Template context variables available:
# - {{ .Name }}     - Repository name
# - {{ .Path }}     - Repository path
# - {{ .URL }}      - Repository URL  
# - {{ .Branch }}   - Repository branch
# - {{ .Tags }}     - Repository tags (map)
# - {{ .Labels }}   - Repository labels (array)

examples:
  - # Documentation templates
    readme: |
      # {{ .Name }}
      
      Repository: {{ .URL }}
      Branch: {{ .Branch }}
      Path: {{ .Path }}
      
      ## Overview
      
      This repository is part of the {{ index .Tags "team" | default "development" }} team's projects.
      
      ## Quick Start
      
      ```bash
      git clone {{ .URL }}
      cd {{ .Name }}
      ```
      
      ## Labels
      {{- range .Labels }}
      - {{ . }}
      {{- end }}
    
    contributing: |
      # Contributing to {{ .Name }}
      
      Thank you for your interest in contributing to {{ .Name }}!
      
      ## Getting Started
      
      1. Fork the repository: {{ .URL }}
      2. Create a feature branch from {{ .Branch }}
      3. Make your changes
      4. Submit a pull request
      
      ## Development Environment
      
      This project is located at: {{ .Path }}
    
  - # Infrastructure templates
    dockerfile: |
      FROM golang:1.21-alpine AS builder
      WORKDIR /app
      
      # Copy go mod files
      COPY go.mod go.sum ./
      RUN go mod download
      
      # Copy source code
      COPY . .
      
      # Build the application
      RUN go build -o {{ .Name }} ./cmd/{{ .Name }}
      
      # Final stage
      FROM alpine:latest
      RUN apk --no-cache add ca-certificates
      WORKDIR /root/
      
      COPY --from=builder /app/{{ .Name }} .
      CMD ["./{{ .Name }}"]
    
    makefile: |
      # Makefile for {{ .Name }}
      # Repository: {{ .URL }}
      
      .PHONY: build test clean run
      
      APP_NAME={{ .Name }}
      BUILD_DIR=./build
      
      build:
      	go build -o $(BUILD_DIR)/$(APP_NAME) ./cmd/$(APP_NAME)
      
      test:
      	go test ./...
      
      clean:
      	rm -rf $(BUILD_DIR)
      
      run: build
      	$(BUILD_DIR)/$(APP_NAME)
    
  - # CI/CD templates  
    github-actions: |
      name: {{ .Name }} CI/CD
      
      on:
        push:
          branches: [ {{ .Branch }} ]
        pull_request:
          branches: [ {{ .Branch }} ]
      
      jobs:
        test:
          runs-on: ubuntu-latest
          steps:
          - uses: actions/checkout@v3
          - name: Set up Go
            uses: actions/setup-go@v3
            with:
              go-version: 1.21
          - name: Test
            run: go test ./...
      
      {{- if has .Labels "deployable" }}
        deploy:
          needs: test
          runs-on: ubuntu-latest
          if: github.ref == 'refs/heads/{{ .Branch }}'
          steps:
          - name: Deploy {{ .Name }}
            run: echo "Deploying {{ .Name }} from {{ .URL }}"
      {{- end }}
    
    jenkins-pipeline: |
      pipeline {
          agent any
          
          environment {
              APP_NAME = '{{ .Name }}'
              REPO_URL = '{{ .URL }}'
              BRANCH = '{{ .Branch }}'
          }
          
          stages {
              stage('Checkout') {
                  steps {
                      git branch: env.BRANCH, url: env.REPO_URL
                  }
              }
              
              stage('Test') {
                  steps {
                      sh 'go test ./...'
                  }
              }
              
              stage('Build') {
                  steps {
                      sh 'go build -o ${APP_NAME} ./cmd/${APP_NAME}'
                  }
              }
          }
      }
    
  - # Configuration templates
    gitignore: |
      # {{ .Name }} - Generated .gitignore
      
      # Binaries
      {{ .Name }}
      {{ .Name }}.exe
      
      # Build artifacts
      /build/
      /dist/
      
      {{- if eq (index .Tags "language") "go" }}
      # Go specific
      *.so
      *.dylib
      *.dll
      vendor/
      {{- end }}
      
      {{- if eq (index .Tags "language") "node" }}
      # Node specific
      node_modules/
      npm-debug.log*
      yarn-debug.log*
      {{- end }}
      
      # IDE
      .vscode/
      .idea/
      *.swp
      *.swo
      *~
    
    license-mit: |
      MIT License
      
      Copyright (c) 2026 {{ index .Tags "company" | default "Repository Owner" }}
      
      Permission is hereby granted, free of charge, to any person obtaining a copy
      of this software and associated documentation files (the "Software"), to deal
      in the Software without restriction, including without limitation the rights
      to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
      copies of the Software, and to permit persons to whom the Software is
      furnished to do so, subject to the following conditions:
      
      The above copyright notice and this permission notice shall be included in all
      copies or substantial portions of the Software.